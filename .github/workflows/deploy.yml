name: Deploy FoodExpress

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Get EC2 IP
        run: echo "IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Wait for EC2
        run: sleep 120

      - name: Copy files to EC2
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no -i key.pem" \
          --exclude '.git' \
          --exclude '.github' \
          ./ ubuntu@$IP:/home/ubuntu/app

      - name: Deploy App
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$IP << 'EOF'
          cd /home/ubuntu/app
          sudo docker stop app || true
          sudo docker rm app || true
          sudo docker build -t app .
          sudo docker run -d -p 3000:3000 --name app app
          EOF

      - name: Test App
        run: curl http://$IP:3000